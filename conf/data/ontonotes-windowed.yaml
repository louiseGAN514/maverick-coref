datamodule:
  _target_: data.pl_data_modules.BasePLDataModule
  dataset:
    train:
      _target_: data.datasets.OntonotesDataset
      name: 'train'
      path: 'data/prepare_ontonotes/train.english.jsonlines'
      batch_size: "${data.datamodule.batch_sizes.train}"
      processed_dataset_path: 'data/cache_w${data.datamodule.dataset.train.window_size}_s${data.datamodule.dataset.train.stride}/${model.module.model.huggingface_model_name}/ontonotes/train'
      tokenizer: "${model.module.model.huggingface_model_name}"
      window_size: 512
      stride: null  # null → non-overlapping (stride = window_size); e.g. 256 for 50% overlap
    val:
      _target_: data.datasets.OntonotesDataset
      name: 'val'
      path: 'data/prepare_ontonotes/dev.english.jsonlines'
      batch_size: "${data.datamodule.batch_sizes.train}"
      processed_dataset_path: 'data/cache_w${data.datamodule.dataset.train.window_size}_s${data.datamodule.dataset.train.stride}/${model.module.model.huggingface_model_name}/ontonotes/val'
      tokenizer: "${model.module.model.huggingface_model_name}"
      window_size: 512
      stride: null
    test:
      _target_: data.datasets.OntonotesDataset
      name: 'test'
      path: 'data/prepare_ontonotes/test.english.jsonlines'
      batch_size: "${data.datamodule.batch_sizes.train}"
      processed_dataset_path: 'data/cache_w${data.datamodule.dataset.train.window_size}_s${data.datamodule.dataset.train.stride}/${model.module.model.huggingface_model_name}/ontonotes/test'
      tokenizer: "${model.module.model.huggingface_model_name}"
      window_size: 512
      stride: null

  batch_sizes:
    train: 1
    val: 1
    test: 1

  num_workers:
    train: 0
    val: 0
    test: 0
